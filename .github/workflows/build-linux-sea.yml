name: build-linux-sea

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Build SEA (Linux)
        run: npm run build:sea:linux
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bot-linux
          path: dist/bot

